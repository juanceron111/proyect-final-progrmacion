<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestionar Usuarios | Harmonic</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<a href="admin.html" class="btn-regreso">← Volver al Panel</a>

<div class="container">
    <div class="table-container" style="margin-bottom: 30px;">
        <h2>Registrar Nuevo Usuario</h2>
        <div class="form-grid">
            <input type="text" id="userNombre" placeholder="Nombre Completo">
            <input type="email" id="userEmail" placeholder="Correo Electrónico">
            <input type="password" id="userPass" placeholder="Contraseña Temporal">
            <select id="userRol">
                <option value="VENDEDOR">Vendedor</option>
                <option value="ADMIN">Administrador</option>
            </select>
        </div>
        <button onclick="guardarUsuario()">Registrar Usuario</button>
    </div>

    <h2>Usuarios del Sistema</h2>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Email</th>
                    <th>Rol</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tabla-usuarios-admin">
                </tbody>
        </table>
    </div>
</div>

<script src="../js/adminUsuarios.js"></script>
</body>
</html>
