<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Historial | Harmonic</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<a href="vendedor.html" class="btn-regreso">← Volver al Panel</a>

<div class="container">
    <h2>Historial de Ventas</h2>

    <div class="form-grid" style="margin-bottom: 20px;">
        <input type="date" placeholder="Por fecha">
        <input type="text" placeholder="Por cliente o ID de venta">
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>ID Venta</th>
                    <th>Cliente</th>
                    <th>Fecha</th>
                    <th>Total (COP)</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>
    </div>
</div>

<script src="../js/historialVentas.js"></script>
</body>
</html>
